[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  # SUPABASE_URL and SUPABASE_ANON_KEY are public, browser-side values — they
  # MUST live in the frontend HTML for the site to talk to Supabase, so they are
  # safe to appear in committed files. Tell Netlify's secret scanner to ignore
  # these two. The real secrets (SERVICE_ROLE, AMAZON_*, ADMIN_PASSWORD) are
  # never in code and stay scanned/protected.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY"

[functions]
  node_bundler = "esbuild"

[functions."auto-pick"]
  timeout = 26

[functions."save-deals"]
  timeout = 26

# All Deals grid refreshes twice a day — 7:00 & 19:00 UTC = 2:00 AM & 2:00 PM CDT.
# Runs BEFORE the 2:30 Top Picks refresh so the picks draw from a freshly synced
# grid. Both syncs REPLACE their store's auto-pulled deals (is_top_pick=false) and
# preserve manually curated Top Picks (is_top_pick=true).
[functions."sync-deals"]
  schedule = "0 7,19 * * *"
  timeout = 26

[functions."sync-walmart"]
  schedule = "10 7,19 * * *"
  timeout = 26

# Promo-code deals from the VA's Google Sheet — pulled every 15 minutes so codes
# appear within minutes of being entered. Incremental + time-capped; no-ops until
# CODES_SHEET_CSV_URL is set. 5-day auto-expiry; sheet is the source of truth.
[functions."sync-codes"]
  schedule = "*/15 * * * *"
  timeout = 26

# Daily Top Deal Picks refresh. Runs every 15 min but the function self-gates:
# it fires ONCE per day at/after the admin-configured run time (Central), reading
# `settings.pick_run_time` (default 2:30 AM) so the time is editable without a
# redeploy. Replaces the picks with a randomized set of 10 (favoring promo codes).
[functions."promote-top-picks"]
  schedule = "*/15 * * * *"
  timeout = 26

# Daily price logger for the "Verified Lowest" filter. Records each deal's price
# once a day (Central) and flags deals sitting at/near their 30-day low. Runs at
# 7:40 UTC (2:40 AM CT), after the morning grid sync. Kickoff self-gates to the
# 15-min background worker. No-ops until the price_history table + verified_low
# column exist in Supabase.
[functions."log-prices"]
  schedule = "40 7 * * *"
  timeout = 26

# Self-hosted deep linker: /go/<ASIN> runs the go function, which adds the
# affiliate tag and redirects the shopper to Amazon.
[[redirects]]
  from = "/go/*"
  to = "/.netlify/functions/go/:splat"
  status = 200

# The homepage is index.html, which Netlify serves at "/" automatically —
# no root redirect needed.

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
