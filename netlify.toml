[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."auto-pick"]
  timeout = 26

[functions."save-deals"]
  timeout = 26

[functions."sync-deals"]
  schedule = "0 6 * * *"
  timeout = 26

# Self-hosted deep linker: /go/<ASIN> runs the go function, which adds the
# affiliate tag and redirects the shopper to Amazon. Must come before the
# catch-all root redirect below.
[[redirects]]
  from = "/go/*"
  to = "/.netlify/functions/go/:splat"
  status = 200

[[redirects]]
  from = "/"
  to = "/founditcheaper-demo.html"
  status = 200

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
